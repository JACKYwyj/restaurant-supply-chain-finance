# 餐饮供应链金融赋能平台 - Docker Compose
# 使用: docker-compose up -d

services:
  # 后端API服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: restaurant-finance-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-jwt-secret-change-in-production}
      - DATABASE_URL=sqlite:///restaurant_finance.db
      - CORS_ORIGINS=http://localhost:80,http://127.0.0.1:80
    volumes:
      - ./data:/app/backend/data
      - ./logs:/app/backend/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - finance-network

  # 前端Nginx服务 (可选，如果需要分离部署)
  frontend:
    image: nginx:alpine
    container_name: restaurant-finance-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - finance-network

  # MySQL数据库 (可选，用于生产环境)
  # 取消注释以启用MySQL
  # db:
  #   image: mysql:8.0
  #   container_name: restaurant-finance-db
  #   environment:
  #     - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
  #     - MYSQL_DATABASE=restaurant_finance
  #     - MYSQL_USER=${DB_USER}
  #     - MYSQL_PASSWORD=${DB_PASSWORD}
  #   volumes:
  #     - mysql-data:/var/lib/mysql
  #   ports:
  #     - "3306:3306"
  #   restart: unless-stopped
  #   networks:
  #     - finance-network

networks:
  finance-network:
    driver: bridge

